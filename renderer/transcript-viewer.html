<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relay Transcript History</title>
    <link rel="stylesheet" href="styles/design-system.css">
    <style>
        body {
            background-color: var(--color-surface);
            color: var(--color-text);
            font-family: var(--font-stack);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background: var(--color-background);
            border-right: 1px solid var(--color-border);
            display: flex;
            flex-direction: column;
            padding-top: 50px;
        }

        .sidebar-header {
            padding: 16px;
            font-size: var(--font-size-lg);
            font-weight: 600;
        }

        .search-box {
            margin: 0 12px 12px;
            padding: 8px 12px;
            border-radius: var(--radius-md);
            border: 1px solid var(--color-border);
            background: var(--color-surface);
            color: var(--color-text);
            font-size: var(--font-size-sm);
            outline: none;
            width: calc(100% - 24px);
        }

        .search-box:focus {
            border-color: var(--color-accent);
        }

        #session-list {
            flex: 1;
            overflow-y: auto;
            padding: 0 8px;
        }

        .session-item {
            padding: 10px 12px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            margin-bottom: 2px;
            transition: background 0.2s;
        }

        .session-item:hover {
            background: rgba(0, 0, 0, 0.05);
        }

        .session-item.active {
            background: var(--color-accent);
            color: white;
        }

        .session-item.active .session-meta {
            color: rgba(255, 255, 255, 0.7);
        }

        .session-label {
            font-size: var(--font-size-sm);
            font-weight: 500;
            margin-bottom: 2px;
        }

        .session-meta {
            font-size: var(--font-size-xs);
            color: var(--color-secondary);
        }

        .session-empty {
            padding: 20px;
            text-align: center;
            color: var(--color-secondary);
            font-size: var(--font-size-sm);
        }

        /* Main content */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding-top: 50px;
        }

        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            border-bottom: 1px solid var(--color-border);
            flex-shrink: 0;
        }

        .toolbar-title {
            font-size: var(--font-size-base);
            font-weight: 600;
        }

        .export-btns {
            display: flex;
            gap: 8px;
        }

        .export-btn {
            padding: 6px 12px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--color-border);
            background: var(--color-surface);
            color: var(--color-text);
            font-size: var(--font-size-xs);
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
        }

        .export-btn:hover {
            background: var(--color-accent);
            color: white;
            border-color: var(--color-accent);
        }

        #transcript-content {
            flex: 1;
            overflow-y: auto;
            padding: 16px 20px;
        }

        .transcript-row {
            display: flex;
            align-items: baseline;
            gap: 12px;
            padding: 4px 0;
            line-height: 1.5;
        }

        .transcript-time {
            flex-shrink: 0;
            width: 80px;
            font-size: var(--font-size-xs);
            color: var(--color-secondary);
            font-variant-numeric: tabular-nums;
        }

        .transcript-speaker {
            flex-shrink: 0;
            width: 90px;
            font-size: var(--font-size-xs);
            font-weight: 600;
        }

        .transcript-speaker-spacer {
            flex-shrink: 0;
            width: 90px;
        }

        .transcript-text {
            flex: 1;
            font-size: var(--font-size-sm);
        }

        .transcript-text mark {
            background: rgba(0, 113, 227, 0.3);
            color: inherit;
            border-radius: 2px;
            padding: 0 2px;
        }

        .transcript-empty {
            text-align: center;
            color: var(--color-secondary);
            padding: 40px;
            font-size: var(--font-size-sm);
        }

        /* Empty state */
        #empty-state {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            color: var(--color-secondary);
            gap: 12px;
        }

        #empty-state .empty-icon {
            font-size: 48px;
            opacity: 0.5;
        }

        #empty-state .empty-text {
            font-size: var(--font-size-base);
        }

        #empty-state .empty-hint {
            font-size: var(--font-size-sm);
            opacity: 0.7;
        }
    </style>
</head>

<body>
    <div class="sidebar">
        <div class="sidebar-header">Transcripts</div>
        <input type="text" id="search-input" class="search-box" placeholder="Search transcripts...">
        <div id="session-list"></div>
    </div>

    <div class="main-content">
        <div class="toolbar">
            <div class="toolbar-title">Transcript History</div>
            <div class="export-btns">
                <button id="export-txt" class="export-btn">Export TXT</button>
                <button id="export-srt" class="export-btn">Export SRT</button>
                <button id="export-vtt" class="export-btn">Export VTT</button>
            </div>
        </div>

        <div id="transcript-content"></div>

        <div id="empty-state">
            <div class="empty-icon">📝</div>
            <div class="empty-text">No transcripts yet</div>
            <div class="empty-hint">Start a conversation or meeting and transcripts will appear here.</div>
        </div>
    </div>

    <script type="module" src="transcript-viewer.js"></script>
</body>

</html>
